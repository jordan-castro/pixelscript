name: Run Tests (except repl)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-python:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Python setup
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Run Python Test Script
      run: python scripts/test.py
      
